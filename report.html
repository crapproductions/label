<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report — Crap Productions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <a class="logo-link" href="index.html" aria-label="Crap Productions home">
    <img class="site-logo" src="assets/ui/logo.png" alt="Crap Productions">
  </a>

  <nav class="image-nav" aria-label="Main navigation">
    <a href="index.html" aria-label="Home">
      <img src="assets/ui/home.png" alt="Home">
    </a>

    <a href="catalogue.html" aria-label="Catalogue">
      <img src="assets/ui/catalogue.png" alt="Catalogue">
    </a>

    <a href="report.html" aria-label="Report">
      <img src="assets/ui/report.png" alt="Report">
    </a>

    <a href="contact.html" aria-label="Contact">
      <img src="assets/ui/contact.png" alt="Contact">
    </a>
  </nav>
</aside>

  <main class="main report-main">
    <section class="report-grid" id="reportGrid" aria-label="Crap Productions visual reports"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Close image">×</button>
    <img class="lightbox-image" src="" alt="">
  </div>

  <script>
    const reportGrid = document.getElementById("reportGrid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.querySelector(".lightbox-image");
    const closeButton = document.querySelector(".lightbox-close");

    const maxReportNumber = 360;
    const imageBasePath = "assets/reports/report-";

    function padNumber(number) {
      return String(number).padStart(3, "0");
    }

    function imageExists(src) {
      return new Promise((resolve) => {
        const tester = new Image();

        tester.onload = () => resolve(true);
        tester.onerror = () => resolve(false);

        tester.src = src;
      });
    }

    function addReportImage(src, alt) {
      const figure = document.createElement("figure");
      figure.className = "report-item";

      const image = document.createElement("img");
      image.src = src;
      image.alt = alt;
      image.loading = "lazy";

      image.addEventListener("click", () => {
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
      });

      figure.appendChild(image);
      reportGrid.appendChild(figure);
    }

    async function loadReports() {
      const checks = [];

      for (let number = maxReportNumber; number >= 1; number--) {
        const padded = padNumber(number);
        const src = `${imageBasePath}${padded}.jpg`;

        checks.push(
          imageExists(src).then((exists) => ({
            exists,
            src,
            alt: `Report image ${padded}`,
            number
          }))
        );
      }

      const results = await Promise.all(checks);

      results
        .filter((item) => item.exists)
        .sort((a, b) => b.number - a.number)
        .forEach((item) => {
          addReportImage(item.src, item.alt);
        });
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
    }

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox || event.target === closeButton || event.target === lightboxImage) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeLightbox();
      }
    });

    loadReports();
  </script>
</body>
</html>
