<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report — Crap Productions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <a class="logo-link" href="index.html" aria-label="Crap Productions home">
    <img class="site-logo" src="assets/ui/logo.png" alt="Crap Productions">
  </a>

  <nav class="image-nav" aria-label="Main navigation">
    <a href="index.html" aria-label="Home">
      <img src="assets/ui/home.png" alt="Home">
    </a>

    <a href="catalogue.html" aria-label="Catalogue">
      <img src="assets/ui/catalogue.png" alt="Catalogue">
    </a>

    <a href="mail-order.html" aria-label="Mail Order">
      <img src="assets/ui/order.png" alt="Order">
    </a>

    <a href="report.html" aria-label="Report">
      <img src="assets/ui/report.png" alt="Report">
    </a>

    <a href="contact.html" aria-label="Contact">
      <img src="assets/ui/contact.png" alt="Contact">
    </a>
  </nav>
</aside>

  <main class="main report-main">
    <section class="report-grid" id="reportGrid" aria-label="Crap Productions visual reports"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Close image">×</button>
    <img class="lightbox-image" src="" alt="">
  </div>

  <script>
    const reportGrid = document.getElementById("reportGrid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.querySelector(".lightbox-image");
    const closeButton = document.querySelector(".lightbox-close");

    const maxReportNumber = 400;
    const imageBasePath = "assets/reports/report-";

    function padNumber(number) {
      return String(number).padStart(3, "0");
    }

    function getReportSrc(number) {
      return `${imageBasePath}${padNumber(number)}.jpg`;
    }

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt;
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
    }

    function updateHash(number) {
      history.replaceState(null, "", `#report-${padNumber(number)}`);
    }

    function addReportImage(number) {
      const padded = padNumber(number);
      const src = getReportSrc(number);

      const figure = document.createElement("figure");
      figure.className = "report-item";
      figure.id = `report-${padded}`;

      const image = document.createElement("img");
      image.src = src;
      image.alt = `Report image ${padded}`;
      image.loading = "lazy";
      image.decoding = "async";
      image.dataset.reportNumber = padded;

      image.onerror = () => {
        figure.remove();
      };

      image.addEventListener("click", () => {
        openLightbox(image.src, image.alt);
        updateHash(number);
      });

      figure.appendChild(image);
      reportGrid.appendChild(figure);
    }

    function loadReports() {
      for (let number = maxReportNumber; number >= 1; number--) {
        addReportImage(number);
      }
    }

    function openReportFromHash() {
      const match = window.location.hash.match(/^#report-(\d{1,3})$/);

      if (!match) return;

      const number = Number(match[1]);

      if (!Number.isInteger(number) || number < 1 || number > maxReportNumber) return;

      const padded = padNumber(number);
      const src = getReportSrc(number);
      const alt = `Report image ${padded}`;

      const tester = new Image();

      tester.onload = () => {
        const target = document.getElementById(`report-${padded}`);

        if (target) {
          target.scrollIntoView({ block: "center" });
        }

        openLightbox(src, alt);
      };

      tester.onerror = () => {
        console.warn(`Report image ${padded} not found.`);
      };

      tester.src = src;
    }

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox || event.target === closeButton || event.target === lightboxImage) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeLightbox();
      }
    });

    window.addEventListener("hashchange", openReportFromHash);

    loadReports();
    openReportFromHash();
  </script>
</body>
</html>
