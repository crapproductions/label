<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report — Crap Productions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
  <a class="logo-link" href="index.html" aria-label="Crap Productions home">
    <img class="site-logo" src="assets/ui/logo.png" alt="Crap Productions">
  </a>

  <nav class="side-nav" aria-label="Main navigation">
    <a href="index.html">HOME</a>
    <a href="catalogue.html">CATALOGUE</a>
    <a href="report.html">REPORT</a>
    <a href="contact.html">CONTACT</a>
  </nav>
</aside>

  <main class="main">
    <section class="report-grid" aria-label="Crap Productions visual reports">
      <figure class="report-item">
        <img src="assets/reports/report-001.jpg" alt="Report image 001">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-002.jpg" alt="Report image 002">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-003.jpg" alt="Report image 003">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-004.jpg" alt="Report image 004">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-005.jpg" alt="Report image 005">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-006.jpg" alt="Report image 006">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-007.jpg" alt="Report image 007">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-008.jpg" alt="Report image 008">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-009.jpg" alt="Report image 009">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-010.jpg" alt="Report image 010">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-011.jpg" alt="Report image 011">
      </figure>
      <figure class="report-item">
        <img src="assets/reports/report-012.jpg" alt="Report image 012">
      </figure>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Close image preview">×</button>
    <img class="lightbox-image" src="" alt="">
  </div>

  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.querySelector(".lightbox-image");
    const closeButton = document.querySelector(".lightbox-close");
    const reportImages = document.querySelectorAll(".report-item img");

    reportImages.forEach((image) => {
      image.addEventListener("click", () => {
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
      });
    });

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
    }

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox || event.target === closeButton || event.target === lightboxImage) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeLightbox();
      }
    });
  </script>

</body>
</html>
