<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>VIP Pass — Crap Productions</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;background:#fff;color:#000;font-family:Arial,Helvetica,sans-serif;letter-spacing:.08em}
    body{min-height:100vh;display:grid;place-items:center;padding:28px}
    .guest-page{width:min(720px,100%);border:2px solid #000;padding:34px 42px 42px;background:#fff;text-align:center}
    .guest-title{margin:0 0 32px;font-size:clamp(34px,8vw,72px);font-weight:700;letter-spacing:.34em;line-height:.92;text-transform:uppercase;text-indent:.34em}
    .guest-image{display:block;width:min(610px,100%);height:auto;margin:0 auto 30px}
    .guest-form{display:flex;flex-direction:column;gap:12px;margin:0 auto;width:min(470px,100%)}
    .guest-form label{display:block;text-align:left;margin:0}
    .guest-form span{display:none}
    .guest-form input,.guest-form textarea{width:100%;border:1.5px solid #000;border-radius:0;background:#fff;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:400;letter-spacing:.08em;line-height:1.15;padding:13px 16px}
    .guest-form textarea{min-height:94px;resize:vertical}
    .guest-form input::placeholder,.guest-form textarea::placeholder{color:#000;opacity:1}
    .guest-form input:focus,.guest-form textarea:focus{outline:0;border-width:2px}
    .guest-submit{appearance:none;width:100%;border:2px solid #000;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;letter-spacing:.18em;line-height:1;text-transform:uppercase;padding:15px 14px 14px;cursor:pointer}
    .guest-submit:hover,.guest-submit:focus-visible{background:#fff;color:#000;outline:0}
    .guest-submit:disabled{cursor:wait;opacity:.65}
    .guest-message{min-height:20px;margin:16px 0 0;font-size:13px;font-weight:700;letter-spacing:.12em;line-height:1.35}
    .guest-sink{display:none}
    @media(max-width:680px){body{padding:20px}.guest-page{padding:28px 22px 34px}.guest-title{font-size:38px;letter-spacing:.28em;text-indent:.28em;margin-bottom:24px}.guest-image{width:100%;margin-bottom:24px}.guest-form{width:88%}.guest-submit{font-size:28px}}
  </style>
</head>
<body>
  <main class="guest-page" aria-label="VIP pass guest form">
    <h1 class="guest-title">VIP PASS</h1>
    <img class="guest-image" src="/assets/ui/reservation-header.jpg?v=20260624guest" alt="Night Animal Live Baked Paint">
    <form class="guest-form" id="guestForm" method="POST" target="guestSink">
      <label><span>NAME</span><input type="text" name="name" placeholder="NAME" autocomplete="name" required></label>
      <label><span>GUESTS</span><input type="number" name="guests" placeholder="GUESTS" min="1" inputmode="numeric" required></label>
      <label><span>NOTE</span><textarea name="note" placeholder="NOTE"></textarea></label>
      <input type="hidden" name="source" value="crap.productions/guest">
      <button class="guest-submit" type="submit">CRAP</button>
    </form>
    <p class="guest-message" id="guestMessage" aria-live="polite"></p>
    <iframe class="guest-sink" name="guestSink" title="Guest submission"></iframe>
  </main>
  <script>
    const guestForm = document.getElementById('guestForm');
    const guestMessage = document.getElementById('guestMessage');
    const guestSubmit = document.querySelector('.guest-submit');

    const endpointBase = 'https://script.google.com/macros/s/';
    const endpointId = 'AKfycbzZLjg7tcz29VasNEww8seWw2j4SjFcWRxGXrdJ5QY0nfLMIaZ8dWI7zRs5AcPTYv4fKw';
    guestForm.setAttribute('action', endpointBase + endpointId + '/exec');

    guestForm.addEventListener('submit', function () {
      guestSubmit.disabled = true;
      guestSubmit.textContent = 'SENDING';
      guestMessage.textContent = 'SENT. THANK YOU.';

      window.setTimeout(function () {
        guestForm.reset();
        guestSubmit.disabled = false;
        guestSubmit.textContent = 'CRAP';
      }, 1200);
    });
  </script>
</body>
</html>
