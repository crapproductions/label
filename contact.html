<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Crap Productions</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="reservation.css?v=20260621a">
</head>
<body>
<aside class="sidebar">
  <a class="logo-link" href="index.html" aria-label="Crap Productions home">
    <img class="site-logo" src="assets/ui/logo.png" alt="Crap Productions">
  </a>

  <nav class="image-nav" aria-label="Main navigation">
    <a href="index.html" aria-label="Home"><img src="assets/ui/home.png" alt="Home"></a>
    <a href="catalogue.html" aria-label="Catalogue"><img src="assets/ui/catalogue.png" alt="Catalogue"></a>
    <a href="report.html" aria-label="Report"><img src="assets/ui/report.png" alt="Report"></a>
    <a href="contact.html" aria-label="Contact"><img src="assets/ui/contact.png" alt="Contact"></a>
  </nav>
</aside>

<main class="main contact-main">
  <section class="contact-layout">
    <img class="contact-image" src="assets/ui/contact-image.jpg" alt="Crap Productions contact">
    <h1 class="contact-title">CONTACT</h1>
    <div class="contact-row">
      <a href="mailto:crapproductions66@gmail.com">MAIL</a>
      <span>/</span>
      <a href="tel:+821057235569">CALL</a>
    </div>
    <div class="reservation-action">
      <button class="reservation-open" type="button" aria-haspopup="dialog" aria-controls="reservationModal">BUY TICKET</button>
    </div>
    <div class="shop-image-block">
      <img class="shop-us-image" src="assets/ui/shop-us.png" alt="SHOP US - Certified Crap Dealer">
      <div class="shop-image-links">
        <a href="https://fastercrapproduction.bandcamp.com/merch" target="_blank" rel="noopener" aria-label="Faster Crap"><img src="assets/ui/faster-crap.png" alt="FASTER CRAP"></a>
        <a href="https://stretchpromo.com/" target="_blank" rel="noopener" aria-label="Stretch Promo"><img src="assets/ui/stretch-promo.png" alt="STRETCH PROMO"></a>
        <a href="https://www.instagram.com/froggyoffice/" target="_blank" rel="noopener" aria-label="Froggy Office"><img src="assets/ui/froggy-office.png" alt="FROGGY OFFICE"></a>
      </div>
    </div>
  </section>
</main>

<div class="reservation-modal" id="reservationModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="reservation-window reservation-ticket-window">
    <button class="reservation-close" type="button" aria-label="Close reservation popup">×</button>
    <img class="reservation-poster" src="assets/ui/reservation-header.jpg?v=20260621a" alt="Night Animal Live Baked Paint">
    <form id="reservationForm" class="reservation-form reservation-ticket-form" action="PASTE_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE" method="POST" target="reservationSink">
      <label><span>NAME</span><input type="text" name="name" placeholder="NAME" autocomplete="name" required></label>
      <label><span>PHONE / CALL</span><input type="tel" name="phone" placeholder="PHONE / CALL" autocomplete="tel" required></label>
      <label><span>QUANTITY</span><input type="number" name="quantity" placeholder="QUANTITY" min="1" inputmode="numeric" required></label>
      <div class="reservation-ticket-info"><div><strong>TICKET</strong><span>20,000KRW</span></div><div>KB INFO</div></div>
      <input type="hidden" name="event" value="Night Animal Live - Baked Paint">
      <input type="hidden" name="source" value="crap.productions/bakedpaint.show">
      <button class="reservation-submit" type="submit">SEND</button>
    </form>
    <p class="reservation-message" id="reservationMessage" aria-live="polite"></p>
    <iframe class="reservation-sink" name="reservationSink" title="Reservation submission"></iframe>
  </div>
</div>

<script src="reservation.js?v=20260621a"></script>
<script>
  (function () {
    var shouldOpenReservation = window.location.search.indexOf('reservation=1') !== -1 || window.location.hash === '#reservation';
    if (!shouldOpenReservation) return;
    window.setTimeout(function () {
      var button = document.querySelector('.reservation-open');
      if (button) button.click();
    }, 250);
  })();
</script>
</body>
</html>
