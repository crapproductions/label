<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalog — Crap Productions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="back">CRAP PRODUCTIONS</a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="events.html">Events</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page">
    <section class="catalog-hero">
      <div class="banner">
        <p>CATALOG</p>
        <h1>Crap Production Releases</h1>
      </div>
    </section>

    <section class="release-grid" aria-label="Crap Productions catalog">
      <article class="release-card" id="crap009">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a2974466671_10.jpg" aria-label="Open Wholesome — Coil Breaks cover">
          <img src="https://f4.bcbits.com/img/a2974466671_10.jpg" alt="Wholesome — Coil Breaks cover">
        </button>
      </article>
      <article class="release-card" id="crap008">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a1901068950_10.jpg" aria-label="Open Wholesome — TOP BEATS cover">
          <img src="https://f4.bcbits.com/img/a1901068950_10.jpg" alt="Wholesome — TOP BEATS cover">
        </button>
      </article>
      <article class="release-card" id="crap007">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a1240470190_10.jpg" aria-label="Open Yoonkee Kim — Total Seom cover">
          <img src="https://f4.bcbits.com/img/a1240470190_10.jpg" alt="Yoonkee Kim — Total Seom cover">
        </button>
      </article>
      <article class="release-card" id="crap004">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3083605741_10.jpg" aria-label="Open The Burners — Burn Me Away cover">
          <img src="https://f4.bcbits.com/img/a3083605741_10.jpg" alt="The Burners — Burn Me Away cover">
        </button>
      </article>
      <article class="release-card" id="crap003">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3104703231_10.jpg" aria-label="Open YTST — We Are Terror cover">
          <img src="https://f4.bcbits.com/img/a3104703231_10.jpg" alt="YTST — We Are Terror cover">
        </button>
      </article>
      <article class="release-card" id="crap002">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a2511064229_10.jpg" aria-label="Open Repo Man — 'Oh Yeah' & 'Money' cover">
          <img src="https://f4.bcbits.com/img/a2511064229_10.jpg" alt="Repo Man — 'Oh Yeah' & 'Money' cover">
        </button>
      </article>
      <article class="release-card" id="category-3">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/0026193995_10.jpg" aria-label="Open Sweaty Hand Lou — Category 3 cover">
          <img src="https://f4.bcbits.com/img/0026193995_10.jpg" alt="Sweaty Hand Lou — Category 3 cover">
        </button>
      </article>
      <article class="release-card" id="crap001">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a2138341644_10.jpg" aria-label="Open T. Nakamura, Y. Fujimoto, N. Takemura — Bonjin No Tanoshimi cover">
          <img src="https://f4.bcbits.com/img/a2138341644_10.jpg" alt="T. Nakamura, Y. Fujimoto, N. Takemura — Bonjin No Tanoshimi cover">
        </button>
      </article>
      <article class="release-card" id="heat-haze-mix">
        <button class="cover-link catalog-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3806598793_10.jpg" aria-label="Open Wholesome — HEAT HAZE Mix cover">
          <img src="https://f4.bcbits.com/img/a3806598793_10.jpg" alt="Wholesome — HEAT HAZE Mix cover">
        </button>
      </article>
    </section>
  </main>

  <div class="catalog-release-modal" id="catalogReleaseModal" aria-hidden="true">
    <button class="catalog-release-modal-close" type="button" aria-label="Close release popup">×</button>
    <div class="catalog-release-modal-card">
      <img class="catalog-release-modal-cover" src="" alt="">
    </div>
  </div>

  <script>
    const catalogReleaseModal = document.getElementById("catalogReleaseModal");
    const catalogReleaseModalCover = document.querySelector(".catalog-release-modal-cover");
    const catalogReleaseModalClose = document.querySelector(".catalog-release-modal-close");
    const catalogCoverButtons = document.querySelectorAll(".catalog-cover-button");

    function openCatalogReleaseModal(src, alt) {
      catalogReleaseModalCover.src = src;
      catalogReleaseModalCover.alt = alt;
      catalogReleaseModal.classList.add("is-open");
      catalogReleaseModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("catalog-modal-open");
    }

    function closeCatalogReleaseModal() {
      catalogReleaseModal.classList.remove("is-open");
      catalogReleaseModal.setAttribute("aria-hidden", "true");
      catalogReleaseModalCover.src = "";
      catalogReleaseModalCover.alt = "";
      document.body.classList.remove("catalog-modal-open");
    }

    catalogCoverButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const cover = button.dataset.cover;
        const image = button.querySelector("img");
        const alt = image ? image.alt : "Release cover";
        openCatalogReleaseModal(cover, alt);
      });
    });

    catalogReleaseModal.addEventListener("click", (event) => {
      if (
        event.target === catalogReleaseModal ||
        event.target === catalogReleaseModalClose ||
        event.target === catalogReleaseModalCover
      ) {
        closeCatalogReleaseModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCatalogReleaseModal();
      }
    });
  </script>
</body>
</html>
