<html lang="en">

  <meta charset="utf-8">

</head>
<body>
  <aside class="sidebar">
    <a class="logo-link" href="index.html" aria-label="Crap Productions home">
      <img class="site-logo" src="assets/ui/logo.png" alt="Crap Productions">
    </a>

    <nav class="image-nav" aria-label="Main navigation">
      <a href="index.html" aria-label="Home">
        <img src="assets/ui/home.png" alt="Home">

      <a href="catalogue.html" aria-label="Catalogue">

  <main class="main catalogue-main">
    <section class="catalogue-list" aria-label="Crap Productions catalogue">
      <article class="catalogue-release" id="crap009">

        </button>
      </article>
      <article class="catalogue-release" id="crap008">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a1901068950_10.jpg" aria-label="Open Wholesome — TOP BEATS cover">
          <img src="https://f4.bcbits.com/img/a1901068950_10.jpg" alt="Wholesome — TOP BEATS cover">
        </button>
      </article>
      <article class="catalogue-release" id="crap007">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a1240470190_10.jpg" aria-label="Open Yoonkee Kim — Total Seom cover">
          <img src="https://f4.bcbits.com/img/a1240470190_10.jpg" alt="Yoonkee Kim — Total Seom cover">
        </button>
      </article>
      <article class="catalogue-release" id="crap004">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3083605741_10.jpg" aria-label="Open The Burners — Burn Me Away cover">
          <img src="https://f4.bcbits.com/img/a3083605741_10.jpg" alt="The Burners — Burn Me Away cover">
        </button>
      </article>
      <article class="catalogue-release" id="crap003">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3104703231_10.jpg" aria-label="Open YTST — We Are Terror cover">
          <img src="https://f4.bcbits.com/img/a3104703231_10.jpg" alt="YTST — We Are Terror cover">
        </button>
      </article>
      <article class="catalogue-release" id="crap002">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a2511064229_10.jpg" aria-label="Open Repo Man — 'Oh Yeah' & 'Money' cover">
          <img src="https://f4.bcbits.com/img/a2511064229_10.jpg" alt="Repo Man — 'Oh Yeah' & 'Money' cover">
        </button>
      </article>
      <article class="catalogue-release" id="category-3">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/0026193995_10.jpg" aria-label="Open Sweaty Hand Lou — Category 3 cover">
          <img src="https://f4.bcbits.com/img/0026193995_10.jpg" alt="Sweaty Hand Lou — Category 3 cover">
        </button>
      </article>
      <article class="catalogue-release" id="crap001">
        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a2138341644_10.jpg" aria-label="Open T. Nakamura, Y. Fujimoto, N. Takemura — Bonjin No Tanoshimi cover">

        <button class="catalogue-cover release-cover-button" type="button" data-cover="https://f4.bcbits.com/img/a3806598793_10.jpg" aria-label="Open Wholesome — HEAT HAZE Mix cover">

        </button>
      </article>
    </section>
  </main>

  <div class="release-modal" id="releaseModal" aria-hidden="true">
    <button class="release-modal-close" type="button" aria-label="Close release popup">×</button>

    <div class="release-modal-card">
      <img class="release-modal-cover" src="" alt="">
    </div>
  </div>

  <script>
    const releaseModal = document.getElementById("releaseModal");
    const releaseModalCover = document.querySelector(".release-modal-cover");
    const releaseModalClose = document.querySelector(".release-modal-close");
    const releaseCoverButtons = document.querySelectorAll(".release-cover-button");

    function openReleaseModal(src, alt) {
      releaseModalCover.src = src;
      releaseModalCover.alt = alt || "Release cover";
      releaseModal.classList.add("is-open");
      releaseModal.setAttribute("aria-hidden", "false");
    }

    function closeReleaseModal() {
      releaseModal.classList.remove("is-open");
      releaseModal.setAttribute("aria-hidden", "true");
      releaseModalCover.src = "";
    }

    releaseCoverButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const image = button.querySelector("img");
        openReleaseModal(button.dataset.cover, image ? image.alt : "Release cover");
      });
    });

    releaseModal.addEventListener("click", (event) => {
      if (
        event.target === releaseModal ||
        event.target === releaseModalClose ||
        event.target === releaseModalCover
      ) {
        closeReleaseModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeReleaseModal();
      }
    });
  </script>
</body>
</html>
